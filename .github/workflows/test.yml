name: Test GCP Auth

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  auth-test:
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/809847807436/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gha-artifact-writer@jameofit.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify identity and repository access
        run: |
          gcloud auth list
          gcloud config set project jameofit
          gcloud artifacts repositories describe jameofit-docker \
            --project=jameofit \
            --location=southamerica-west1