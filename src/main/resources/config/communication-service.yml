server:
  port: 8090

eureka:
  client:
    service-url:
      defaultZone: http://eureka-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: false
    hostname: communication-service

spring:
  mongodb:
    # Spring Boot moderno solo lee la propiedad 'uri'
    uri: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_HOST:communication-service-mongodb}:${MONGO_PORT:27017}/${MONGO_DATABASE:communication_db}?authSource=${MONGO_AUTH_DB:admin}