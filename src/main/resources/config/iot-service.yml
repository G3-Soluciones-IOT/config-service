server:
  port: 8091

eureka:
  client:
    service-url:
      defaultZone: http://eureka-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: false
    hostname: iot-service

auth0:
  issuer-uri: ${AUTH0_ISSUER_URI:https://auth0.local/}
  audience: ${AUTH0_AUDIENCE:jameofit-api}

legacy:
  jwt:
    enabled: ${LEGACY_JWT_ENABLED:true}
    issuer: ${LEGACY_JWT_ISSUER:${JWT_ISSUER:iam-service}}
    jwk-set-uri: ${LEGACY_JWT_JWK_SET_URI:http://iam-service:8081/api/v1/jwks/.well-known/jwks.json}

spring:
  security:
    oauth2:
      resource-server:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI:https://auth0.local/}
          jwk-set-uri: ${LEGACY_JWT_JWK_SET_URI:http://iam-service:8081/api/v1/jwks/.well-known/jwks.json}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: 1

documentation:
  openapi:
    server-url: ${PUBLIC_API_BASE_URL:http://localhost:8080}
    server-description: Public Gateway
